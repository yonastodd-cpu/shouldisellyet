name: Data refresh & deploy (when new data is published)

on:
  schedule:
    - cron: "0 13 * * 1,4"   # Mon & Thu 13:00 UTC — cheap check, full run only if data changed
  workflow_dispatch: {}       # manual run always rebuilds
  push:
    branches: [main]
    paths: ["web/**"]         # site-only changes deploy without re-running the pipeline

permissions:
  contents: write
  pages: write
  id-token: write

env:
  DATA_URL: https://redfin-public-data.s3.us-west-2.amazonaws.com/redfin_market_tracker/zip_code_market_tracker.tsv000.gz

jobs:
  refresh:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4

      - name: Decide rebuild vs deploy-only
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Site edit: deploy as-is, don't re-run the pipeline
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ETAG=$(curl -sI "$DATA_URL" | tr -d '\r' | awk -F'"' 'tolower($0) ~ /^etag:/ {print $2}')
          KNOWN=$(cat .redfin-etag 2>/dev/null || echo "none")
          echo "remote=$ETAG known=$KNOWN"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$ETAG" != "$KNOWN" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
            echo "$ETAG" > .redfin-etag
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No new data — skipping rebuild."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.changed == 'true'
        with:
          python-version: "3.12"

      - name: Snapshot previous verdicts
        if: steps.check.outputs.changed == 'true'
        run: cp -r web/data/zips /tmp/old_zips 2>/dev/null || mkdir -p /tmp/old_zips

      - name: Run pipeline (all states)
        if: steps.check.outputs.changed == 'true'
        run: python pipeline/fetch_data.py

      - name: Send verdict-change alerts (Supabase + Resend)
        if: steps.check.outputs.changed == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python pipeline/notify_changes.py --old /tmp/old_zips --new web/data/zips

      - name: Run tests
        if: steps.check.outputs.changed == 'true'
        run: |
          pip install pytest
          pytest pipeline/ -q

      - name: Commit refreshed data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "sisy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add web/data .redfin-etag
          git diff --cached --quiet || git commit -m "Data refresh $(date +%Y-%m-%d)"
          git push

      - name: Upload site
        if: steps.check.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: refresh
    if: needs.refresh.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
