name: Monthly data refresh & deploy

on:
  schedule:
    - cron: "0 12 20 * *"   # 20th of every month, 12:00 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pipeline (all states)
        run: python pipeline/fetch_data.py

      - name: Run tests
        run: |
          pip install pytest
          pytest pipeline/ -q

      - name: Commit refreshed data
        run: |
          git config user.name "sisy-bot"
          git config user.email "bot@users.noreply.github.com"
          git add web/data
          git diff --cached --quiet || git commit -m "Data refresh $(date +%Y-%m)"
          git push

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
